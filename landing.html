<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Proyecto | Pixel & Code</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Montserrat Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: { gold: '#C5A059', dark: '#0f172a', surface: '#f8fafc' }
                }
            }
        }
    </script>
    <style>
        .gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #AA771C 100%); }
        .input-focus:focus { border-color: #C5A059; ring-color: #C5A059; }
    </style>
</head>
<body class="font-sans text-gray-800 antialiased min-h-screen flex flex-col items-center justify-center p-4 relative" 
      style="background-image: url('Pixel&Code-landingpage.jpg'); background-size: cover; background-position: center; background-attachment: fixed;">

    <!-- Overlay oscuro para resaltar el formulario -->
    <div class="fixed inset-0 bg-dark/70 backdrop-blur-sm z-0"></div>

    <!-- Tarjeta de Registro Principal -->
    <div id="form-container" class="w-full max-w-xl bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-gray-100 transition-all duration-500 relative z-10">
        
        <!-- Header de la Tarjeta -->
        <div class="bg-black p-10 text-center relative">
            <div class="absolute top-0 right-0 w-32 h-32 bg-gold/10 rounded-full -mr-16 -mt-16 blur-3xl"></div>
            
            <!-- LOGO GRANDE ACTUALIZADO -->
            <img src="pixel&pode-logo-landing.png" alt="Pixel & Code Logo" class="h-32 w-auto mx-auto mb-6 object-contain">

            <h1 class="text-white text-2xl font-bold uppercase tracking-[0.2em] mb-2">Registro de Proyecto</h1>
            <p class="text-gray-400 text-xs font-light uppercase tracking-widest">Pixel & Code, MX</p>
        </div>

        <!-- Formulario de Captura -->
        <!-- Action apunta directamente a tu correo usando FormSubmit. Recuerda activarlo la primera vez. -->
        <form action="https://formsubmit.co/durquijob@gmail.com" method="POST" id="registration-form" class="p-8 md:p-12 space-y-6 bg-white">
            
            <!-- Configuraciones ocultas de FormSubmit -->
            <input type="hidden" name="_subject" value="🎯 Nuevo Lead - Proyecto Pixel & Code">
            <input type="hidden" name="_captcha" value="false">
            <!-- <input type="hidden" name="_next" value="https://tu-sitio.netlify.app/gracias.html"> -->

            <!-- Selección de Servicio -->
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3">Servicio Solicitado</label>
                <div class="relative">
                    <select name="Servicio" id="service-select" required 
                        class="w-full bg-gray-50 border border-gray-200 rounded-2xl py-4 px-5 text-sm appearance-none outline-none focus:border-gold focus:ring-1 focus:ring-gold transition">
                        <option value="" disabled>Selecciona un paquete</option>
                        <option value="Emprendedor">Paquete Emprendedor ($6,900 MXN)</option>
                        <option value="Negocio Local + IA" selected>Negocio Local + IA ($8,900 MXN)</option>
                        <option value="Empresarial">Paquete Empresarial ($11,500 MXN)</option>
                        <option value="Consultoria">Consultoría IA Personalizada</option>
                    </select>
                    <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-gold">
                        <i data-lucide="chevron-down" class="w-4 h-4"></i>
                    </div>
                </div>
            </div>

            <!-- Nombre Completo -->
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3">Nombre Completo</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-gray-400">
                        <i data-lucide="user" class="w-4 h-4"></i>
                    </div>
                    <input type="text" name="Nombre" required placeholder="Ej. Daniel Urquijo" 
                        class="w-full bg-gray-50 border border-gray-200 rounded-2xl py-4 pl-12 pr-5 text-sm outline-none focus:border-gold focus:ring-1 focus:ring-gold transition">
                </div>
            </div>

            <!-- Correo Electrónico -->
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3">Correo Electrónico</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-gray-400">
                        <i data-lucide="mail" class="w-4 h-4"></i>
                    </div>
                    <input type="email" name="Email" required placeholder="ejemplo@correo.com" 
                        class="w-full bg-gray-50 border border-gray-200 rounded-2xl py-4 pl-12 pr-5 text-sm outline-none focus:border-gold focus:ring-1 focus:ring-gold transition">
                </div>
            </div>

            <!-- Número Telefónico -->
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3">Número Telefónico (WhatsApp)</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-gray-400">
                        <i data-lucide="phone" class="w-4 h-4"></i>
                    </div>
                    <input type="tel" name="Telefono" required placeholder="442 347 9766" 
                        class="w-full bg-gray-50 border border-gray-200 rounded-2xl py-4 pl-12 pr-5 text-sm outline-none focus:border-gold focus:ring-1 focus:ring-gold transition">
                </div>
            </div>

            <!-- Botón de Envío -->
            <div class="pt-4">
                <button type="submit" class="w-full gold-gradient text-white py-5 rounded-2xl font-bold uppercase text-[10px] tracking-[0.3em] shadow-xl hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3">
                    Enviar Información <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </div>

            <p class="text-[9px] text-gray-400 text-center font-medium uppercase tracking-widest mt-6">
                Tu información está protegida bajo nuestro Aviso de Privacidad.
            </p>
        </form>
    </div>

    <!-- Enlace de regreso -->
    <a href="index.html" class="mt-8 text-white/70 hover:text-white text-[10px] font-bold uppercase tracking-widest flex items-center gap-2 transition relative z-10">
        <i data-lucide="chevron-left" class="w-4 h-4"></i> Volver a Pixel & Code
    </a>

    <script>
        lucide.createIcons();
        // Lógica para capturar el plan desde la URL
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const planParam = urlParams.get('plan');
            const select = document.getElementById('service-select');
            if (planParam) {
                const optionsMap = { 'emprendedor': 'Emprendedor', 'ia': 'Negocio Local + IA', 'empresarial': 'Empresarial' };
                const targetValue = optionsMap[planParam.toLowerCase()];
                if (targetValue) select.value = targetValue;
            }
        });
    </script>
</body>
</html>
