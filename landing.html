<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Proyecto | Pixel & Code</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Montserrat Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: { gold: '#C5A059', dark: '#0f172a', surface: '#f8fafc' }
                }
            }
        }
    </script>
    <style>
        .gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #AA771C 100%); }
    </style>
</head>
<body class="font-sans bg-surface text-gray-800 antialiased min-h-screen flex flex-col">
    
    <!-- Navbar Minimalista -->
    <nav class="bg-black/95 backdrop-blur-md border-b border-gray-900 w-full z-50 py-4 px-6">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3 hover:opacity-80 transition">
                <img src="du-logo.png" alt="DU Logo" class="h-10 w-10 object-cover rounded-md" onerror="this.src='https://placehold.co/100x100/0a0a0a/C5A059?text=DU'">
                <span class="text-white font-black tracking-[0.2em] text-xs uppercase">Pixel & Code</span>
            </a>
            <a href="index.html" class="text-gray-400 hover:text-white transition text-sm flex items-center gap-2">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Volver al inicio
            </a>
        </div>
    </nav>

    <!-- Contenedor Principal -->
    <main class="flex-1 flex items-center justify-center p-4 sm:p-6 py-10 md:py-16">
        <div class="max-w-2xl w-full bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-gray-100">
            
            <!-- Cabecera Formulario -->
            <div class="bg-dark p-8 md:p-12 text-center relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-gold/20 rounded-full -mr-16 -mt-16 blur-2xl"></div>
                <h1 class="text-3xl md:text-4xl font-black text-white italic mb-2 relative z-10">Inicia tu Proyecto</h1>
                <p class="text-gold font-bold text-[10px] uppercase tracking-[0.3em] relative z-10">Arquitectura Digital & IA</p>
            </div>

            <!-- FORMULARIO DIRECTO A INFO@DUPIXELCODE.COM -->
            <form action="https://formsubmit.co/info@dupixelcode.com" method="POST" class="p-8 md:p-12 space-y-6">
                
                <!-- Configuración Interna FormSubmit -->
                <input type="hidden" name="_subject" value="🎯 Nuevo Lead - Proyecto Pixel & Code">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_template" value="table">
                
                <!-- Campos del Formulario -->
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Nombre Completo</label>
                        <input type="text" name="Nombre" required class="w-full bg-surface border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-gold focus:ring-1 focus:ring-gold outline-none transition" placeholder="Ej. Ing. Rubén Rivera">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Empresa / Proyecto</label>
                        <input type="text" name="Empresa" required class="w-full bg-surface border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-gold focus:ring-1 focus:ring-gold outline-none transition" placeholder="Nombre de tu marca">
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Correo Electrónico</label>
                        <input type="email" name="Email" required class="w-full bg-surface border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-gold focus:ring-1 focus:ring-gold outline-none transition" placeholder="tu@correo.com">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">WhatsApp</label>
                        <input type="tel" name="WhatsApp" required class="w-full bg-surface border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-gold focus:ring-1 focus:ring-gold outline-none transition" placeholder="A 10 dígitos">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Paquete de Interés</label>
                    <select name="Paquete" id="plan-select" class="w-full bg-surface border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-gold focus:ring-1 focus:ring-gold outline-none transition cursor-pointer">
                        <option value="No estoy seguro, necesito asesoría">No estoy seguro, necesito asesoría</option>
                        <option value="Emprendedor ($6,900 MXN)">Emprendedor ($6,900 MXN)</option>
                        <option value="Negocio Local + IA ($8,900 MXN)">Negocio Local + IA ($8,900 MXN) ⭐</option>
                        <option value="Empresarial ($11,500 MXN)">Empresarial ($11,500 MXN)</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Cuéntanos sobre tu proyecto</label>
                    <textarea name="Mensaje" rows="4" required class="w-full bg-surface border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-gold focus:ring-1 focus:ring-gold outline-none transition resize-none" placeholder="¿Qué objetivos quieres lograr con tu sitio web o asistente IA?"></textarea>
                </div>

                <button type="submit" class="w-full gold-gradient text-dark font-extrabold px-8 py-4 rounded-xl uppercase text-xs tracking-widest shadow-xl hover:scale-[1.02] transition-transform flex justify-center items-center gap-3 mt-4">
                    Enviar Solicitud <i data-lucide="send" class="w-4 h-4"></i>
                </button>
                
                <p class="text-center text-[9px] text-gray-400 mt-4">Tus datos están protegidos. Al enviar este formulario aceptas nuestra política de privacidad.</p>
            </form>
        </div>
    </main>

    <footer class="bg-black py-6 text-center border-t border-gray-900 mt-auto">
        <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">© 2026 DU Pixel & Code | Querétaro, MX</p>
    </footer>

    <script>
        lucide.createIcons();
        
        // Función para auto-seleccionar el plan basado en la URL (?plan=ia)
        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            const plan = urlParams.get('plan');
            const select = document.getElementById('plan-select');
            
            if(plan) {
                const planLower = plan.toLowerCase();
                Array.from(select.options).forEach(option => {
                    if(option.value.toLowerCase().includes(planLower)) {
                        option.selected = true;
                    }
                });
            }
        });
    </script>
</body>
</html>
